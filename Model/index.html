<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --border-light: #e5e7eb;
            --border-medium: #d1d5db;
            --accent: #000000;
            --accent-hover: #374151;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f0f0f;
                --bg-secondary: #1a1a1a;
                --bg-tertiary: #262626;
                --text-primary: #fafafa;
                --text-secondary: #a3a3a3;
                --text-tertiary: #737373;
                --border-light: #262626;
                --border-medium: #404040;
                --accent: #ffffff;
                --accent-hover: #e5e5e5;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-box h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #111;
        }

        .login-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-tertiary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .history-item.active {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 500;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-light);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .user-menu:hover {
            background-color: var(--bg-tertiary);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-email {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .logout-btn {
            width: 100%;
            padding: 8px;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }

        .logout-btn:hover {
            background: #fecaca;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-primary);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .welcome-logo {
            width: 64px;
            height: 64px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 400px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-md);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .message.user .message-avatar {
            background-color: var(--accent);
            color: white;
        }

        .message.assistant .message-avatar {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        .message-content {
            flex: 1;
            padding-top: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            margin-bottom: 12px;
        }

        .code-block {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin: 12px 0;
        }

        .code-header {
            background-color: var(--bg-tertiary);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }

        .code-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .code-copy-btn {
            background: none;
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .code-copy-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-medium);
        }

        .code-content {
            padding: 12px;
            overflow-x: auto;
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .code-content code {
            color: var(--text-primary);
        }

        .input-container {
            padding: 24px;
            background-color: var(--bg-primary);
            border-top: 1px solid var(--border-light);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        .input-box {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 14px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .input-box:focus-within {
            border-color: var(--border-medium);
            background-color: var(--bg-primary);
        }

        .input-field {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            resize: none;
            max-height: 200px;
            min-height: 24px;
            font-family: inherit;
            line-height: 1.5;
        }

        .input-field::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--border-medium);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h1>Python Coder AI</h1>
            <p>Your AI assistant for Python coding</p>
            <button class="login-btn" onclick="login()">Login with Test Account</button>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New chat
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="chat-history" id="chat-history"></div>
            </div>

            <div class="sidebar-footer">
                <div class="user-menu">
                    <div class="user-avatar" id="avatar">U</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">User</div>
                        <div class="user-email" id="user-email">user@example.com</div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="chat-container" id="chat-container">
                <div class="welcome-screen">
                    <div class="welcome-logo">✦</div>
                    <h1 class="welcome-title">How can I help you today?</h1>
                    <p class="welcome-subtitle">I'm your AI assistant. I can help you with Python coding tasks.</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea id="message-input" class="input-field" placeholder="Message python..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let userId = null;
        let currentConvId = null;
        let messages = [];

        async function login() {
            const res = await fetch('/api/login');
            const data = await res.json();
            if (data.success) {
                userId = data.user.id;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('user-name').textContent = data.user.username;
                document.getElementById('user-email').textContent = data.user.email;
                document.getElementById('avatar').textContent = data.user.username[0].toUpperCase();
                loadConversations();
            }
        }

        async function logout() {
            userId = null;
            currentConvId = null;
            messages = [];
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('chat-history').innerHTML = '';
        }

        async function newChat() {
            const res = await fetch('/api/new-conversation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            const data = await res.json();
            if (data.conversation_id) {
                currentConvId = data.conversation_id;
                messages = [];
                removeWelcomeScreen();
                loadConversations();
            }
        }

        async function extractPreview(messages) {
            // Find AI response in messages
            const aiMsg = messages.find(m => m.role === 'assistant');
            if (!aiMsg) return null;
            
            const content = aiMsg.content;
            
            // If it's code, extract the function/class definition line
            if (content.includes('```')) {
                const codeMatch = content.match(/```(?:python|js)?\n([^\n]+)/i);
                if (codeMatch) {
                    const firstLine = codeMatch[1].trim();
                    // Extract function/class name
                    const defMatch = firstLine.match(/def\s+(\w+)|class\s+(\w+)/i);
                    if (defMatch) {
                        return defMatch[1] || defMatch[2];
                    }
                }
            }
            
            // Otherwise, extract first meaningful phrase
            const cleanContent = content.replace(/```[\s\S]*?```/g, '').trim();
            const firstLine = cleanContent.split('\n')[0];
            
            if (firstLine && firstLine.length > 0) {
                // Extract key terms
                const keywords = firstLine.match(/\b[A-Z][a-z]+|\b(function|code|use|create|define|get|find|make|build)\b/gi);
                if (keywords) {
                    return keywords.slice(0, 2).join(' ');
                }
                
                // Fallback to first 30 chars
                return firstLine.length > 30 ? firstLine.substring(0, 30) + '...' : firstLine;
            }
            
            return null;
        }
        
        async function loadConversations() {
            const res = await fetch('/api/conversations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            const data = await res.json();
            const history = document.getElementById('chat-history');
            history.innerHTML = '';
            if (data.conversations) {
                data.conversations.forEach(async conv => {
                    const item = document.createElement('div');
                    item.className = 'history-item' + (conv.id === currentConvId ? ' active' : '');
                    
                    // Fetch messages to get better preview
                    try {
                        const msgRes = await fetch('/api/messages', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                user_id: userId,
                                conversation_id: conv.id
                            })
                        });
                        const msgData = await msgRes.json();
                        
                        // Try to extract smart preview from AI response
                        if (msgData.messages && msgData.messages.length > 0) {
                            const preview = await extractPreview(msgData.messages);
                            if (preview) {
                                item.textContent = preview;
                            } else {
                                // Fallback to first user message
                                const userMsg = msgData.messages.find(m => m.role === 'user');
                                if (userMsg) {
                                    item.textContent = userMsg.content.substring(0, 30) + (userMsg.content.length > 30 ? '...' : '');
                                } else {
                                    item.textContent = new Date(conv.created_at).toLocaleDateString();
                                }
                            }
                        } else {
                            item.textContent = new Date(conv.created_at).toLocaleDateString();
                        }
                    } catch (err) {
                        item.textContent = new Date(conv.created_at).toLocaleDateString();
                    }
                    
                    item.onclick = () => {
                        currentConvId = conv.id;
                        loadMessages(conv.id);
                    };
                    history.appendChild(item);
                });
            }
        }

        async function loadMessages(conversationId) {
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId,
                        conversation_id: conversationId
                    })
                });
                const data = await res.json();
                
                // Clear the chat container and remove welcome screen
                const container = document.getElementById('chat-container');
                container.innerHTML = '';
                removeWelcomeScreen();
                
                // Reset messages array
                messages = [];
                
                // Display all loaded messages
                if (data.messages) {
                    data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content);
                    });
                }
                
                loadConversations();
            } catch (err) {
                console.error('Error loading messages:', err);
                clearChat();
            }
        }

        function clearChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '<div class="welcome-screen"><div class="welcome-logo">✦</div><h1 class="welcome-title">How can I help you today?</h1><p class="welcome-subtitle">I\'m your AI assistant. I can help you with Python coding tasks.</p></div>';
        }

        function removeWelcomeScreen() {
            const welcome = document.querySelector('.welcome-screen');
            if (welcome) welcome.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !userId) return;
            if (!currentConvId) await newChat();

            const welcome = document.querySelector('.welcome-screen');
            if (welcome) welcome.remove();

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('send-btn').disabled = true;

            try {
                // Keep last 3 messages for context + new message
                const contextMessages = messages.slice(-3);
                const allMessages = [...contextMessages, { role: 'user', content: text }];
                
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        conversation_id: currentConvId,
                        messages: allMessages,
                        max_new_tokens: 512
                    })
                });
                const data = await res.json();
                addMessage('assistant', data.response || ('Error: ' + data.error));
            } catch (err) {
                addMessage('assistant', 'Error: ' + err.message);
            } finally {
                document.getElementById('send-btn').disabled = false;
                loadConversations();
            }
        }

        function parseContent(content) {
            // Match code blocks with triple backticks
            const codeBlockRegex = /```(?:python|javascript|js|py)?\n([\s\S]*?)```/g;
            let html = '';
            let lastIndex = 0;
            let match;
            
            while ((match = codeBlockRegex.exec(content)) !== null) {
                // Add text before code block
                const beforeText = content.substring(lastIndex, match.index);
                if (beforeText) {
                    html += `<div class="message-text">${beforeText}</div>`;
                }
                
                // Add code block
                const code = match[1].trim();
                const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                html += `<div class="code-block">
                    <div class="code-header">
                        <span class="code-label">Code</span>
                        <button class="code-copy-btn" onclick="copyCode('${codeId}')">Copy</button>
                    </div>
                    <pre id="${codeId}" class="code-content"><code>${escapeHtml(code)}</code></pre>
                </div>`;
                
                lastIndex = match.index + match[0].length;
            }
            
            // Add any remaining text
            const remainingText = content.substring(lastIndex);
            if (remainingText) {
                html += `<div class="message-text">${remainingText}</div>`;
            }
            
            return html || `<div class="message-text">${content}</div>`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyCode(id) {
            const codeElement = document.getElementById(id);
            const code = codeElement.textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function addMessage(role, content) {
            messages.push({ role, content });
            const container = document.getElementById('chat-container');
            const msg = document.createElement('div');
            msg.className = 'message ' + role;
            
            // Parse content for code blocks
            const contentHTML = parseContent(content);
            msg.innerHTML = `<div class="message-avatar">${role === 'user' ? 'You' : 'AI'}</div><div class="message-content">${contentHTML}</div>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function autoResize(ta) {
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
            document.getElementById('send-btn').disabled = ta.value.trim().length === 0;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
