<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyCoder AI</title>
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #ececec;
            --text-primary: #0d0d0d;
            --text-secondary: #555;
            --text-tertiary: #999;
            --border-light: #e4e4e7;
            --border-medium: #d0d0d6;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --accent-solid: #5865f2;
            --accent-start: #5865f2;
            --accent-end: #5865f2;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --danger-bg-hover: #fecaca;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,.12);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-full: 9999px;
            --sidebar-width: 268px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #111111;
                --bg-secondary: #1a1a1a;
                --bg-tertiary: #242424;
                --text-primary: #ececec;
                --text-secondary: #8e8e9a;
                --text-tertiary: #5a5a68;
                --border-light: #252525;
                --border-medium: #333;
                --accent: #5865f2;
                --accent-hover: #4752c4;
                --accent-solid: #5865f2;
                --accent-start: #5865f2;
                --accent-end: #5865f2;
                --danger-bg: #2a1515;
                --danger-bg-hover: #3a1e1e;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ─── LOGIN ─────────────────────────────────────── */
        .login-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.75);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-overlay.hidden { display: none; }

        .login-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 44px 40px;
            width: 100%; max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(.92) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-logo {
            width: 48px; height: 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 22px;
        }
        .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        .login-box p  { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

        .login-btn {
            width: 100%; padding: 13px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background .2s, transform .15s;
        }
        .login-btn:hover { background: var(--border-medium); }
        .login-btn:active { transform: scale(.98); }

        /* ─── LAYOUT ─────────────────────────────────────── */
        .app-container { display: flex; height: 100vh; }

        /* ─── SIDEBAR ─────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 14px 12px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .brand {
            display: flex; align-items: center; gap: 9px;
            padding: 6px 8px; flex: 1;
        }
        .brand-icon {
            width: 28px; height: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .brand-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }

        .new-chat-btn {
            width: 30px; height: 30px;
            background: none; border: 1px solid var(--border-medium);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s ease; flex-shrink: 0;
        }
        .new-chat-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .sidebar-section-label {
            font-size: 11px; font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: .6px;
            padding: 16px 14px 6px;
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }

        .chat-history { display: flex; flex-direction: column; gap: 2px; }

        .history-item {
            padding: 9px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text-secondary);
            transition: all .15s ease;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; gap: 8px;
        }
        .history-item::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--border-medium);
            flex-shrink: 0;
            transition: background .15s;
        }
        .history-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .history-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary); font-weight: 500;
        }
        .history-item.active::before { background: var(--text-tertiary); }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-light);
        }
        .user-menu {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: var(--radius-md);
            cursor: default;
            background: var(--bg-tertiary);
        }
        .user-avatar {
            width: 32px; height: 32px;
            border-radius: var(--radius-full);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-weight: 700; font-size: 13px; flex-shrink: 0;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-name  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .user-email { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .logout-btn {
            width: 100%; margin-top: 8px; padding: 8px;
            background: var(--danger-bg); color: var(--danger);
            border: none; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: background .15s;
        }
        .logout-btn:hover { background: var(--danger-bg-hover); }

        /* ─── MAIN ────────────────────────────────────────── */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Header bar */
        .chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-primary);
            flex-shrink: 0;
        }
        .chat-header-icon {
            width: 22px; height: 22px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
        }
        .chat-header-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .chat-header-badge {
            font-size: 11px; padding: 2px 8px;
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-weight: 500; letter-spacing: .2px;
        }

        /* Chat area */
        .chat-area-wrapper { flex: 1; position: relative; overflow: hidden; }

        .chat-container {
            height: 100%; overflow-y: auto;
            padding: 28px 24px;
            display: flex; flex-direction: column; gap: 6px;
            scroll-behavior: smooth;
        }

        /* Scroll-to-bottom FAB */
        .scroll-btn {
            position: absolute; bottom: 16px; right: 20px;
            width: 34px; height: 34px;
            background: var(--bg-primary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-md);
            display: none; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary);
            transition: all .15s;
            z-index: 10;
        }
        .scroll-btn.visible { display: flex; }
        .scroll-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        /* Welcome screen */
        .welcome-screen {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; text-align: center;
            padding: 60px 24px 40px;
            animation: fadeIn .4s ease;
        }

        .welcome-logo {
            width: 52px; height: 52px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        .welcome-title {
            font-size: 28px; font-weight: 700;
            color: var(--text-primary);
        }

        .welcome-subtitle { font-size: 15px; color: var(--text-secondary); max-width: 380px; line-height: 1.6; }

        .suggestion-grid {
            display: none;
        }

        /* Messages */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message {
            display: flex; gap: 14px;
            max-width: 800px; width: 100%; margin: 0 auto;
            animation: fadeIn .25s ease;
            padding: 4px 0;
        }
        .message:hover .message-time { opacity: 1; }

        .message-avatar {
            width: 30px; height: 30px;
            border-radius: var(--radius-md);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            margin-top: 2px;
        }
        .message.user      .message-avatar {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
        }
        .message.assistant .message-avatar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-size: 15px;
        }

        .message-body { flex: 1; min-width: 0; }

        .message-meta {
            display: flex; align-items: baseline; gap: 8px;
            margin-bottom: 4px;
        }
        .message-sender { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .message-time   { font-size: 11px; color: var(--text-tertiary); opacity: 0; transition: opacity .2s; }

        .message-text {
            font-size: 14.5px; line-height: 1.7;
            color: var(--text-primary); white-space: pre-wrap;
        }
        .message-text:not(:last-child) { margin-bottom: 10px; }

        /* Code blocks */
        .code-block {
            border-radius: var(--radius-md);
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .code-header {
            background: #21252b;
            padding: 9px 14px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .code-lang-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600; color: #abb2bf;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .code-lang-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #6b6b78;
        }
        .code-copy-btn {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            color: #abb2bf; padding: 4px 10px;
            font-size: 12px; border-radius: 5px;
            cursor: pointer; transition: all .15s;
        }
        .code-copy-btn:hover { background: rgba(255,255,255,.14); color: #fff; }
        .code-copy-btn.copied { color: #98c379; border-color: rgba(152,195,121,.4); }

        .code-content {
            margin: 0; padding: 0;
            overflow-x: auto;
            font-size: 13.5px; line-height: 1.55;
            background: #282c34;
        }
        .code-content code { background: none; }

        /* Typing indicator */
        .typing-indicator {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 0;
        }
        .typing-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--text-tertiary);
            animation: bounce .9s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: .18s; }
        .typing-dot:nth-child(3) { animation-delay: .36s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: .5; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }

        /* Input area */
        .input-container {
            padding: 16px 24px 20px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .input-wrapper { max-width: 800px; margin: 0 auto; }

        .input-box {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 12px 14px;
            display: flex; align-items: flex-end; gap: 10px;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-box:focus-within {
            border-color: var(--border-medium);
            background: var(--bg-primary);
        }

        .input-field {
            flex: 1; border: none; outline: none;
            background: transparent;
            font-size: 14.5px; color: var(--text-primary);
            resize: none; max-height: 180px; min-height: 22px;
            font-family: inherit; line-height: 1.5;
        }
        .input-field::placeholder { color: var(--text-tertiary); }

        .send-btn {
            width: 34px; height: 34px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
            background: var(--bg-tertiary);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) { background: var(--border-medium); color: var(--text-primary); }
        .send-btn:active:not(:disabled) { transform: scale(.96); }
        .send-btn:disabled { opacity: .3; cursor: not-allowed; }

        .input-hint {
            margin-top: 7px; text-align: center;
            font-size: 11.5px; color: var(--text-tertiary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
    </style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <div class="login-logo">🐍</div>
        <h1>PyCoder AI</h1>
        <p>Your intelligent Python coding assistant</p>
        <button class="login-btn" onclick="login()">Sign in with Test Account</button>
    </div>
</div>

<!-- App -->
<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-icon">🐍</div>
                <span class="brand-name">PyCoder AI</span>
            </div>
            <button class="new-chat-btn" onclick="newChat()" title="New chat">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>

        <div class="sidebar-content">
            <div class="sidebar-section-label">Recent</div>
            <div class="chat-history" id="chat-history"></div>
        </div>

        <div class="sidebar-footer">
            <div class="user-menu">
                <div class="user-avatar" id="avatar">U</div>
                <div class="user-info">
                    <div class="user-name"  id="user-name">User</div>
                    <div class="user-email" id="user-email">user@example.com</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-icon">🐍</div>
            <span class="chat-header-title">Python Assistant</span>
            <span class="chat-header-badge">py_coder_final1</span>
        </div>

        <!-- Chat area -->
        <div class="chat-area-wrapper">
            <div class="chat-container" id="chat-container">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-logo">🐍</div>
                    <h1 class="welcome-title">How can I help you?</h1>
                    <p class="welcome-subtitle">Ask me to write, debug, or optimise your Python code.</p>
                </div>
            </div>

            <!-- Scroll-to-bottom button -->
            <button class="scroll-btn" id="scroll-btn" onclick="scrollToBottom()" title="Scroll to bottom">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>

        <!-- Input -->
        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="message-input" class="input-field"
                        placeholder="Ask me anything about Python…"
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">Press <kbd style="font-family:inherit;background:var(--bg-tertiary);border:1px solid var(--border-medium);border-radius:3px;padding:1px 5px;font-size:11px">Enter</kbd> to send &nbsp;·&nbsp; <kbd style="font-family:inherit;background:var(--bg-tertiary);border:1px solid var(--border-medium);border-radius:3px;padding:1px 5px;font-size:11px">Shift+Enter</kbd> for new line</div>
            </div>
        </div>

    </main>
</div>

<script>
    let userId = null;
    let currentConvId = null;
    let messages = [];

    // ── Scroll-to-bottom button ──────────────────────────
    const chatContainer = document.getElementById('chat-container');
    const scrollBtn = document.getElementById('scroll-btn');
    chatContainer.addEventListener('scroll', () => {
        const atBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 80;
        scrollBtn.classList.toggle('visible', !atBottom);
    });
    function scrollToBottom() {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    // ── Auth ─────────────────────────────────────────────
    async function login() {
        const res = await fetch('/api/login');
        const data = await res.json();
        if (data.success) {
            userId = data.user.id;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('user-name').textContent  = data.user.username;
            document.getElementById('user-email').textContent = data.user.email;
            document.getElementById('avatar').textContent     = data.user.username[0].toUpperCase();
            loadConversations();
        }
    }

    async function logout() {
        userId = null; currentConvId = null; messages = [];
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('chat-history').innerHTML = '';
        clearChat();
    }

    // ── Conversations ─────────────────────────────────────
    async function newChat() {
        const res = await fetch('/api/new-conversation', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();
        if (data.conversation_id) {
            currentConvId = data.conversation_id;
            messages = [];
            clearChat();
            loadConversations();
        }
    }

    async function extractPreview(msgs) {
        const aiMsg = msgs.find(m => m.role === 'assistant');
        if (!aiMsg) return null;
        const content = aiMsg.content;
        if (content.includes('```')) {
            const codeMatch = content.match(/```(?:python|js)?\n([^\n]+)/i);
            if (codeMatch) {
                const firstLine = codeMatch[1].trim();
                const defMatch  = firstLine.match(/def\s+(\w+)|class\s+(\w+)/i);
                if (defMatch) return defMatch[1] || defMatch[2];
            }
        }
        const cleanContent = content.replace(/```[\s\S]*?```/g, '').trim();
        const firstLine = cleanContent.split('\n')[0];
        if (firstLine) {
            return firstLine.length > 32 ? firstLine.substring(0, 32) + '…' : firstLine;
        }
        return null;
    }

    async function loadConversations() {
        const res = await fetch('/api/conversations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();
        const history = document.getElementById('chat-history');
        history.innerHTML = '';
        if (!data.conversations) return;

        data.conversations.forEach(async conv => {
            const item = document.createElement('div');
            item.className = 'history-item' + (conv.id === currentConvId ? ' active' : '');

            try {
                const msgRes  = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, conversation_id: conv.id })
                });
                const msgData = await msgRes.json();
                if (msgData.messages && msgData.messages.length > 0) {
                    const preview = await extractPreview(msgData.messages);
                    if (preview) {
                        item.textContent = preview;
                    } else {
                        const userMsg = msgData.messages.find(m => m.role === 'user');
                        item.textContent = userMsg
                            ? (userMsg.content.length > 32 ? userMsg.content.substring(0, 32) + '…' : userMsg.content)
                            : new Date(conv.created_at).toLocaleDateString();
                    }
                } else {
                    item.textContent = new Date(conv.created_at).toLocaleDateString();
                }
            } catch {
                item.textContent = new Date(conv.created_at).toLocaleDateString();
            }

            item.onclick = () => { currentConvId = conv.id; loadMessages(conv.id); };
            history.appendChild(item);
        });
    }

    async function loadMessages(conversationId) {
        try {
            const res  = await fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, conversation_id: conversationId })
            });
            const data = await res.json();
            clearChat();
            messages = [];
            if (data.messages) {
                data.messages.forEach(msg => addMessage(msg.role, msg.content));
            }
            loadConversations();
        } catch (err) {
            console.error('Error loading messages:', err);
            clearChat();
        }
    }

    function clearChat() {
        const container = document.getElementById('chat-container');
        container.innerHTML = `
        <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-logo">🐍</div>
            <h1 class="welcome-title">How can I help you?</h1>
            <p class="welcome-subtitle">Ask me to write, debug, or optimise your Python code.</p>
        </div>`;
    }

    // ── Context helpers ───────────────────────────────────
    // Returns true when the prompt refers to something already said
    function isFollowUpPrompt(text) {
        const t = text.toLowerCase().trim();
        // Referential pronouns / phrases pointing at previous content
        if (/\b(this|that|it|above|the code|the function|the class|the error|those|them|these)\b/.test(t)) return true;
        // Starts with a verb or question word that implies an existing subject
        if (/^(explain|fix|debug|modify|change|update|improve|optimise|optimize|refactor|rewrite|simplify|can you|could you|what |how |why |is there|are there|what does|what is)/.test(t)) return true;
        return false;
    }

    // Collect the last `maxPairs` complete user+assistant exchanges from history
    function buildContext(history, currentText) {
        const maxPairs = isFollowUpPrompt(currentText) ? 2 : 1;
        const result = [];
        let pairs = 0;
        for (let i = history.length - 1; i >= 1 && pairs < maxPairs; i--) {
            if (history[i].role === 'assistant' && history[i - 1].role === 'user') {
                result.unshift(history[i]);     // assistant first (will be 2nd in order)
                result.unshift(history[i - 1]); // user message
                pairs++;
                i--; // skip the user msg we already consumed (loop does one more --)
            }
        }
        return result;
    }

    // ── Messaging ─────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text  = input.value.trim();
        if (!text || !userId) return;
        if (!currentConvId) await newChat();

        const welcome = document.getElementById('welcome-screen');
        if (welcome) welcome.remove();

        addMessage('user', text);
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;

        showTypingIndicator();

        try {
            // Build context from complete exchanges; follow-up prompts get 2 pairs, others get 1
            const allMessages = [...buildContext(messages, text), { role: 'user', content: text }];

            const res  = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    conversation_id: currentConvId,
                    messages: allMessages,
                    max_new_tokens: 512
                })
            });
            const data = await res.json();
            removeTypingIndicator();
            addMessage('assistant', data.response || ('Error: ' + data.error));
        } catch (err) {
            removeTypingIndicator();
            addMessage('assistant', 'Error: ' + err.message);
        } finally {
            document.getElementById('send-btn').disabled = false;
            loadConversations();
        }
    }

    // ── Typing indicator ──────────────────────────────────
    function showTypingIndicator() {
        const container = document.getElementById('chat-container');
        const msg = document.createElement('div');
        msg.className = 'message assistant';
        msg.id = 'typing-indicator';
        msg.innerHTML = `
            <div class="message-avatar">🐍</div>
            <div class="message-body">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>`;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }
    function removeTypingIndicator() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    // ── Content parsing ───────────────────────────────────
    function parseContent(content) {
        const codeBlockRegex = /```([\w]*)\n?([\s\S]*?)```/g;
        let html = '', lastIndex = 0, match;

        while ((match = codeBlockRegex.exec(content)) !== null) {
            const beforeText = content.substring(lastIndex, match.index);
            if (beforeText.trim()) {
                html += `<div class="message-text">${escapeHtml(beforeText)}</div>`;
            }

            const lang   = match[1] || 'python';
            const code   = match[2].trim();
            const codeId = 'code-' + Math.random().toString(36).substr(2, 9);

            // Highlight
            let highlighted;
            try {
                highlighted = hljs.highlight(code, { language: lang }).value;
            } catch {
                highlighted = hljs.highlightAuto(code).value;
            }

            html += `<div class="code-block">
                <div class="code-header">
                    <span class="code-lang-badge">
                        <span class="code-lang-dot"></span>
                        ${escapeHtml(lang || 'code')}
                    </span>
                    <button class="code-copy-btn" id="btn-${codeId}" onclick="copyCode('${codeId}', 'btn-${codeId}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy
                    </button>
                </div>
                <pre class="code-content"><code id="${codeId}">${highlighted}</code></pre>
            </div>`;

            lastIndex = match.index + match[0].length;
        }

        const remaining = content.substring(lastIndex);
        if (remaining.trim()) {
            html += `<div class="message-text">${escapeHtml(remaining)}</div>`;
        }

        return html || `<div class="message-text">${escapeHtml(content)}</div>`;
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function copyCode(codeId, btnId) {
        const code = document.getElementById(codeId).textContent;
        const btn  = document.getElementById(btnId);
        navigator.clipboard.writeText(code).then(() => {
            btn.classList.add('copied');
            btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
            }, 2000);
        });
    }

    function addMessage(role, content) {
        messages.push({ role, content });
        const container = document.getElementById('chat-container');
        const msg       = document.createElement('div');
        msg.className   = 'message ' + role;

        const now     = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const sender  = role === 'user' ? 'You' : 'PyCoder AI';
        const avatar  = role === 'user' ? 'U' : '🐍';

        msg.innerHTML = `
            <div class="message-avatar">${avatar}</div>
            <div class="message-body">
                <div class="message-meta">
                    <span class="message-sender">${sender}</span>
                    <span class="message-time">${timeStr}</span>
                </div>
                ${parseContent(content)}
            </div>`;

        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }

    function autoResize(ta) {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
        document.getElementById('send-btn').disabled = ta.value.trim().length === 0;
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }
</script>
</body>
</html>
